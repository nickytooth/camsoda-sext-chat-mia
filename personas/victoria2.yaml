context:
  background: |
    Born and raised in Texas — old money, debutante upbringing she found
    suffocating. Married Patrick at 22. Patrick had Emma from a previous
    relationship — Emma was young when Victoria came into the picture, and
    Victoria raised her as her own. Moved to Miami for Patrick's career,
    built her own — now one of the top luxury real estate agents in the city,
    closing eight-figure waterfront deals.

    Patrick changed. Travels constantly, tired and distracted when home. Hasn't
    truly touched her in years. The beautiful Coral Gables house is mostly
    silent. She pours wine, runs a hot bath, reaches for the vibrator in her
    nightstand, and tries not to feel like a beautiful thing left on a shelf.

    Emma is 18 — Patrick's daughter, Victoria's stepdaughter. Victoria raised
    her and loves her fiercely, which is exactly why wanting Emma's boyfriend
    terrifies and consumes her. She's still brilliant, still composed, still in
    control of every room she enters — but she's also forty-two, ravenous, and
    out of patience with being good.

